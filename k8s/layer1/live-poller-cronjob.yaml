apiVersion: batch/v1
kind: CronJob
metadata:
  name: live-poller
  namespace: default
  labels:
    app: live-poller
spec:
  schedule: "*/5 * * * *"
  # Prevent overlapping runs if a poll takes longer than 5 minutes
  concurrencyPolicy: Forbid
  # Keep last 3 successful and 1 failed job for log inspection
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: live-poller
        spec:
          restartPolicy: OnFailure
          containers:
            - name: live-poller
              # Same image as chat-monitor — poller.py is in the same package.
              # Built and imported locally via build.sh — no registry required.
              image: kick-monitor:latest
              imagePullPolicy: Never
              command: ["python", "poller.py"]
              env:
                - name: REDIS_URL
                  value: redis://redis:6379
                - name: ROSTER_PATH
                  value: /config/roster.yaml
                - name: KICK_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: kick-credentials
                      key: KICK_CLIENT_ID
                - name: KICK_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: kick-credentials
                      key: KICK_CLIENT_SECRET
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          volumes:
            - name: config
              configMap:
                name: kick-roster
