apiVersion: apps/v1
kind: Deployment
metadata:
  name: clip-dashboard
  namespace: default
  labels:
    app: clip-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clip-dashboard
  template:
    metadata:
      labels:
        app: clip-dashboard
    spec:
      containers:
        - name: clip-dashboard
          image: kick-dashboard:latest
          imagePullPolicy: Never
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: CLIPS_DIR
              value: /clips
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: clips
              mountPath: /clips
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: clips
          persistentVolumeClaim:
            claimName: clips-pvc
      restartPolicy: Always
