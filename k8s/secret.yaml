apiVersion: v1
kind: Secret
metadata:
  name: kick-credentials
  namespace: default
type: Opaque
stringData:
  # Replace these with your actual Kick API credentials before applying.
  # Get credentials from: https://kick.com/settings/developer
  KICK_CLIENT_ID: "your-client-id-here"
  KICK_CLIENT_SECRET: "your-client-secret-here"
